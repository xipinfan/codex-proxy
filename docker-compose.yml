# Codex Proxy — 默认一键启动应用与 PostgreSQL
#
# 直接启动：
#   docker compose up -d --build
#
# 只看服务：
#   docker compose ps
#
# 查看应用日志：
#   docker compose logs -f codex-proxy
#
# 可通过同目录 .env 覆盖端口、数据库账号和后端域名等环境变量。

name: codex-proxy

networks:
  codex-net:
    driver: bridge

volumes:
  codex_pg_data:
  codex_mysql_data:

services:
  codex-proxy:
    build: .
    image: ghcr.io/xxxxteam/codex-proxy:latest
    container_name: codex-proxy-app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      LISTEN: ":8080"
      AUTH_DIR: "/app/auths"
      BACKEND_DOMAIN: "${BACKEND_DOMAIN:-chatgpt.com}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      REFRESH_INTERVAL: "${REFRESH_INTERVAL:-3000}"
      MAX_RETRY: "${MAX_RETRY:-2}"
      ENABLE_HEALTHY_RETRY: "${ENABLE_HEALTHY_RETRY:-true}"
      HEALTH_CHECK_INTERVAL: "${HEALTH_CHECK_INTERVAL:-300}"
      HEALTH_CHECK_MAX_FAILURES: "${HEALTH_CHECK_MAX_FAILURES:-2}"
      HEALTH_CHECK_CONCURRENCY: "${HEALTH_CHECK_CONCURRENCY:-5}"
      REFRESH_CONCURRENCY: "${REFRESH_CONCURRENCY:-50}"
      STARTUP_ASYNC_LOAD: "${STARTUP_ASYNC_LOAD:-true}"
      ENABLE_HTTP2: "${ENABLE_HTTP2:-false}"
      MAX_CONNS_PER_HOST: "${MAX_CONNS_PER_HOST:-512}"
      MAX_IDLE_CONNS: "${MAX_IDLE_CONNS:-1024}"
      MAX_IDLE_CONNS_PER_HOST: "${MAX_IDLE_CONNS_PER_HOST:-512}"
      DB_ENABLED: "true"
      DB_DRIVER: "postgres"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_USER: "${POSTGRES_USER:-codex}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-codex}"
      DB_NAME: "${POSTGRES_DB:-codex_proxy}"
      DB_SSLMODE: "${DB_SSLMODE:-disable}"
      BASE_URL: "${BASE_URL:-}"
      PROXY_URL: "${PROXY_URL:-}"
      API_KEYS: "${API_KEYS:-}"
    volumes:
      - ./auths:/app/auths
      # 如需完全自定义配置，可取消下一行注释并准备宿主机 config.yaml
      # - ./config.yaml:/app/config.yaml:ro
    networks:
      - codex-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: codex-proxy-pg
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codex}
      POSTGRES_DB: ${POSTGRES_DB:-codex_proxy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - codex_pg_data:/var/lib/postgresql/data
    networks:
      - codex-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mysql:
    image: mysql:8.4
    profiles: ["mysql"]
    container_name: codex-proxy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-codex_proxy}
      MYSQL_USER: ${MYSQL_USER:-codex}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-codex}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - codex_mysql_data:/var/lib/mysql
    networks:
      - codex-net
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 8s
      timeout: 5s
      retries: 12
      start_period: 30s
