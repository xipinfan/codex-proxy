name: 发布发行版

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write
  pull-requests: write
  
jobs:
  release:
    name: 📦 Release
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: 🧾 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          cache: true

      - name: 📦 下载依赖
        run: go mod download

      - name: 🔨 构建项目
        env:
          CGO_ENABLED: 0
        run: |
          set -e

          # Linux
          GOOS=linux GOARCH=amd64 go build -o codex-proxy-linux-amd64
          GOOS=linux GOARCH=arm64 go build -o codex-proxy-linux-arm64
          GOOS=linux GOARCH=386 go build -o codex-proxy-linux-386

          # Windows
          GOOS=windows GOARCH=amd64 go build -o codex-proxy-windows-amd64.exe
          GOOS=windows GOARCH=arm64 go build -o codex-proxy-windows-arm64.exe
          GOOS=windows GOARCH=386 go build -o codex-proxy-windows-386.exe

          # macOS
          GOOS=darwin GOARCH=amd64 go build -o codex-proxy-darwin-amd64
          GOOS=darwin GOARCH=arm64 go build -o codex-proxy-darwin-arm64

      - name: 🚀 release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: 🗃 上传 Release 资产
        if: ${{ steps.release.outputs.release_created }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.release.outputs.tag_name }}
          body: ${{ steps.release.outputs.release_notes }}
          files: |
            codex-proxy-linux-amd64
            codex-proxy-linux-arm64
            codex-proxy-linux-386
            codex-proxy-windows-amd64.exe
            codex-proxy-windows-arm64.exe
            codex-proxy-windows-386.exe
            codex-proxy-darwin-amd64
            codex-proxy-darwin-arm64
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker/OCI 引用要求仓库路径全小写；github.repository 可能含大写组织名。
      - name: GHCR 镜像基址（小写）
        id: ghcr
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.ghcr.outputs.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.tag_name }}
            type=raw,value=latest
            type=sha,prefix=

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=codex-proxy-docker
            type=registry,ref=${{ steps.ghcr.outputs.image }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=codex-proxy-docker
            type=registry,ref=${{ steps.ghcr.outputs.image }}:buildcache,mode=max